name: NRSampleApp

# XcodeGen config — the .xcodeproj is generated from this file and is
# gitignored. Run `xcodegen generate` after changes.
#
# Two app targets — iOS and tvOS — share the same Swift source tree.
# Platform-specific differences are handled via `#if os(iOS)` in code.

options:
  bundleIdPrefix: com.newrelic.video.sample
  deploymentTarget:
    iOS: "15.0"
    tvOS: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "1.0"
    GENERATE_INFOPLIST_FILE: "YES"

targets:
  NRSampleApp_iOS:
    type: application
    platform: iOS
    sources:
      - path: NRSampleApp
    settings:
      base:
        PRODUCT_NAME: NRSampleApp
        PRODUCT_BUNDLE_IDENTIFIER: com.newrelic.video.sample.NRSampleApp
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

  NRSampleApp_tvOS:
    type: application
    platform: tvOS
    sources:
      - path: NRSampleApp
    settings:
      base:
        PRODUCT_NAME: NRSampleApp
        PRODUCT_BUNDLE_IDENTIFIER: com.newrelic.video.sample.NRSampleApp.tvOS
        TARGETED_DEVICE_FAMILY: "3"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"

schemes:
  NRSampleApp_iOS:
    build:
      targets:
        NRSampleApp_iOS: all
    run:
      config: Debug
    archive:
      config: Release
  NRSampleApp_tvOS:
    build:
      targets:
        NRSampleApp_tvOS: all
    run:
      config: Debug
    archive:
      config: Release
