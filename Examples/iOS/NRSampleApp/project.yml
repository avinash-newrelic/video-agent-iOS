name: NRSampleApp

# XcodeGen config — the .xcodeproj is generated from this file and is
# gitignored. Run `xcodegen generate` after changes.

options:
  bundleIdPrefix: com.newrelic.video.sample
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

targets:
  NRSampleApp:
    type: application
    platform: iOS
    sources:
      - path: NRSampleApp
      - path: scenarios
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.newrelic.video.sample.NRSampleApp
        SWIFT_VERSION: "5"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UIBackgroundModes: "audio"

  NRSampleAppUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [NRSampleAppUITests]
    dependencies:
      - target: NRSampleApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.newrelic.video.sample.NRSampleAppUITests
        SWIFT_VERSION: "5"
        TEST_TARGET_NAME: NRSampleApp
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  NRSampleApp:
    build:
      targets:
        NRSampleApp: all
        NRSampleAppUITests: [test]
    test:
      targets:
        - NRSampleAppUITests
      gatherCoverageData: false
    run:
      config: Debug
    archive:
      config: Release
