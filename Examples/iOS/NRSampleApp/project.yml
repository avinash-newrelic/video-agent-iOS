name: NRSampleApp

# XcodeGen config — the .xcodeproj is generated from this file and is
# gitignored. Run `xcodegen generate` after changes.

options:
  bundleIdPrefix: com.newrelic.video.sample
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true

targets:
  NRSampleApp:
    type: application
    platform: iOS
    sources:
      - path: NRSampleApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.newrelic.video.sample.NRSampleApp
        SWIFT_VERSION: "5"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

schemes:
  NRSampleApp:
    build:
      targets:
        NRSampleApp: all
    run:
      config: Debug
    archive:
      config: Release
