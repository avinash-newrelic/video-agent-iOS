name: playback-master

# Master telemetry-generator workflow.
#
# Discovers NRVA versions to test (from GitHub releases of
# newrelic/video-agent-iOS, filtered ≥ v3.0.0), then fans out to:
#   - playback-build.yml — one .app per (version, platform)
#   - playback-test.yml  — one test job per (version, leg) reusing .app
#
# Purpose: push NRVA telemetry to a New Relic account from multiple agent
# versions, multiple OS legs. No verification / pass-fail gate — events
# land in NR UI, you eyeball them.
#
# Lives only on fork branch `internal/video-rig`. Never merged to master.

on:
  schedule:
    # 22:53 UTC = 04:23 IST — daily. Off-:00/:30 to avoid GitHub cron contention.
    - cron: '53 22 * * *'

  workflow_dispatch:
    inputs:
      versions:
        description: 'Comma-separated NRVA versions, empty = all tags ≥ v3.0.0'
        required: false
        default: ''
      legs:
        description: 'Comma-separated leg tags. Empty = default 4 legs.'
        required: false
        default: ''
      scenarios:
        description: 'Comma-separated scenario ids. Empty = default scenario set.'
        required: false
        default: ''
      nr_overrides:
        description: 'JSON of per-run NRVA overrides, e.g. {"harvest_cycle_secs":5}'
        required: false
        default: '{}'
      min_version:
        description: >-
          Minimum NRVA version (inclusive) for matrix. Default 4.1.0 — first
          tag that has both withCollectorAddress and withQoeAggregateEnabled,
          which our setup calls unconditionally. Lower than this either won't
          build or can't route to staging.
        required: false
        default: '4.1.0'

permissions:
  contents: read

concurrency:
  group: playback-master-${{ github.ref }}
  cancel-in-progress: false   # let in-flight runs finish; queue new ones

jobs:
  discover:
    name: discover NRVA versions + legs + scenarios
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      versions: ${{ steps.versions.outputs.list }}
      legs: ${{ steps.legs.outputs.list }}
      scenarios: ${{ steps.scenarios.outputs.list }}
      trigger_time: ${{ steps.meta.outputs.trigger_time }}
    steps:
      - name: Meta
        id: meta
        run: |
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "trigger_time=$TS" >> "$GITHUB_OUTPUT"
          echo "Triggered at $TS"

      - name: Discover NRVA versions
        id: versions
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSIONS: ${{ inputs.versions }}
          MIN_VERSION: ${{ inputs.min_version || '4.1.0' }}
        run: |
          set -uo pipefail

          # Semver compare via sort -V: pass when version sorts >= MIN_VERSION.
          # Awk implementation handles N.N.N cleanly without bringing in jq deps.
          ge_min() {
            awk -v cur="$1" -v min="$2" 'BEGIN {
              split(cur, a, "."); split(min, b, ".")
              for (i=1; i<=3; i++) {
                ai = a[i] + 0; bi = b[i] + 0
                if (ai > bi) { print "yes"; exit }
                if (ai < bi) { print "no";  exit }
              }
              print "yes"
            }'
          }

          if [ -n "$INPUT_VERSIONS" ]; then
            echo "Explicit version override: $INPUT_VERSIONS (min_version filter bypassed)"
            JSON=$(echo "$INPUT_VERSIONS" | tr ',' '\n' | sed 's/^ *//;s/ *$//' \
                   | grep -v '^$' | jq -R . | jq -sc .)
          else
            echo "Auto-discovering tags ≥ v${MIN_VERSION} from newrelic/video-agent-iOS"
            ALL_TAGS=$(gh release list --repo newrelic/video-agent-iOS --limit 100 --json tagName \
                       --jq '.[].tagName' \
                       | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' \
                       | sed 's/^v//' \
                       | sort -V -u)
            INCLUDED=""
            EXCLUDED=""
            while IFS= read -r v; do
              [ -z "$v" ] && continue
              if [ "$(ge_min "$v" "$MIN_VERSION")" = "yes" ]; then
                INCLUDED="${INCLUDED}${v}\n"
              else
                EXCLUDED="${EXCLUDED}${v}\n"
              fi
            done <<< "$ALL_TAGS"
            echo "Included:"; printf '  %b' "$INCLUDED"
            echo "Excluded (pre-${MIN_VERSION} — can't route to staging or won't build):"
            printf '  %b' "$EXCLUDED"
            JSON=$(printf '%b' "$INCLUDED" | grep -v '^$' | jq -R . | jq -sc .)
          fi
          echo "Versions matrix JSON: $JSON"
          echo "list=$JSON" >> "$GITHUB_OUTPUT"

      - name: Resolve leg matrix
        id: legs
        env:
          INPUT_LEGS: ${{ inputs.legs }}
        run: |
          set -uo pipefail
          # Default 4-leg matrix. Override via comma-separated input.
          # `tag` is the stable identifier — used in workflow inputs,
          # artifact names, and as an NRVA global attribute on every
          # event. Don't change these casually; you'll fragment NR UI
          # history. `display` is the human-friendly form used in the
          # Actions UI and run summary.
          DEFAULT='[
            {"tag":"iOS-18-iPhone-16-Pro","display":"iOS 18 · iPhone 16 Pro","device":"iPhone 16 Pro","os_version":"","platform":"iOS"},
            {"tag":"iOS-17-iPhone-15","display":"iOS 17 · iPhone 15","device":"iPhone 15","os_version":"","platform":"iOS"},
            {"tag":"iOS-16-iPhone-14","display":"iOS 16 · iPhone 14","device":"iPhone 14","os_version":"16.4","platform":"iOS"},
            {"tag":"tvOS-18-Apple-TV-4K","display":"tvOS 18 · Apple TV 4K","device":"Apple TV 4K (3rd generation)","os_version":"","platform":"tvOS"}
          ]'
          if [ -n "$INPUT_LEGS" ]; then
            REQUESTED=$(echo "$INPUT_LEGS" | tr ',' '\n' | sed 's/^ *//;s/ *$//' | grep -v '^$' | jq -R . | jq -sc .)
            JSON=$(jq -c --argjson req "$REQUESTED" '[.[] | select(.tag | IN($req[]))]' <<<"$DEFAULT")
          else
            JSON=$(jq -c . <<<"$DEFAULT")
          fi
          echo "Legs: $JSON"
          echo "list=$JSON" >> "$GITHUB_OUTPUT"

      - name: Resolve scenarios
        id: scenarios
        env:
          INPUT_SCEN: ${{ inputs.scenarios }}
        run: |
          set -uo pipefail
          # Wave 2: full event-coverage set.
          # Each scenario uses scripted actions to fire a specific subset of
          # NRVA events. Together they cover every event NRVA emits except
          # buffer-stall (Wave 3) and DRM (Wave 4).
          DEFAULT='content-hls-lifecycle,content-mp4-lifecycle,content-error,ad-vmap-lifecycle,ad-error'
          if [ -n "$INPUT_SCEN" ]; then
            SCEN="$INPUT_SCEN"
          else
            SCEN="$DEFAULT"
          fi
          echo "Scenarios: $SCEN"
          echo "list=$SCEN" >> "$GITHUB_OUTPUT"

  # --- Build .app per (version × platform) -------------------------------
  build:
    needs: discover
    if: needs.discover.outputs.versions != '[]'
    # Explicit short name — otherwise GitHub auto-expands every matrix
    # field into the title (e.g. "build (4.2.0, tvOS)"), and combined
    # with the inner reusable workflow's job name produces a long
    # parenthesized blob in the Actions UI.
    name: build · v${{ matrix.version }} · ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.discover.outputs.versions) }}
        platform: [iOS, tvOS]
    uses: ./.github/workflows/playback-build.yml
    with:
      nrva_version: ${{ matrix.version }}
      platform: ${{ matrix.platform }}

  # --- Run scenarios per (version × leg) ---------------------------------
  test:
    needs: [discover, build]
    if: needs.discover.outputs.versions != '[]'
    # Use the human-friendly `display` field, not the kebab-case `tag`.
    name: test · v${{ matrix.version }} · ${{ matrix.leg.display }}
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.discover.outputs.versions) }}
        leg: ${{ fromJson(needs.discover.outputs.legs) }}
    uses: ./.github/workflows/playback-test.yml
    with:
      nrva_version: ${{ matrix.version }}
      leg_tag: ${{ matrix.leg.tag }}
      device: ${{ matrix.leg.device }}
      os_version: ${{ matrix.leg.os_version }}
      platform: ${{ matrix.leg.platform }}
      scenarios: ${{ needs.discover.outputs.scenarios }}
      run_id: ${{ github.run_id }}
      git_sha: ${{ github.sha }}
      trigger_time: ${{ needs.discover.outputs.trigger_time }}
      nr_overrides: ${{ inputs.nr_overrides || '{}' }}
      collector_address: ${{ vars.NEW_RELIC_COLLECTOR_ADDRESS }}
    secrets: inherit

  # --- Summary (no pass/fail gate — generator, not validator) ------------
  summary:
    needs: [discover, build, test]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download all leg artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          pattern: 'playback-*'
        continue-on-error: true   # missing artifacts are non-fatal here

      - name: Build per-(version × leg) summary matrix
        env:
          VERSIONS: ${{ needs.discover.outputs.versions }}
          LEGS: ${{ needs.discover.outputs.legs }}
          SCENARIOS: ${{ needs.discover.outputs.scenarios }}
          BUILD_RESULT: ${{ needs.build.result }}
          TEST_RESULT: ${{ needs.test.result }}
          TRIGGER_TIME: ${{ needs.discover.outputs.trigger_time }}
        # No `set -e` — generator workflow, must always emit a summary
        # even if some artifacts are missing or malformed.
        run: |
          set -x

          # ---- Header ----
          {
            echo "# 🎬 NRVA telemetry generator — ${TRIGGER_TIME}"
            echo ""
            echo "Branch: \`${{ github.ref_name }}\` · Trigger: \`${{ github.event_name }}\` · Run: [#${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo ""
            echo "**Scenarios:** \`${SCENARIOS}\`"
            echo ""
            echo "**Phase outcomes:** build = \`${BUILD_RESULT}\` · test = \`${TEST_RESULT}\`"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # ---- Parse versions + legs (JSON arrays) ----
          VERS_LIST=$(echo "$VERSIONS" | jq -r '.[]' 2>/dev/null || true)
          # Pair each leg's stable tag (used for artifact filename) with its
          # human-friendly display (used in the column header). Newline-
          # separated `tag<TAB>display` is robust to spaces in display.
          LEG_PAIRS=$(echo "$LEGS" | jq -r '.[] | "\(.tag)\t\(.display // .tag)"' 2>/dev/null || true)

          if [ -z "$VERS_LIST" ] || [ -z "$LEG_PAIRS" ]; then
            echo "_(no version/leg info — discover step did not populate)_" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # ---- Build markdown table: rows = versions, columns = legs ----
          HEADER="| Version |"
          SEP="|---|"
          while IFS=$'\t' read -r _tag display; do
            HEADER="$HEADER ${display} |"
            SEP="$SEP---|"
          done <<< "$LEG_PAIRS"
          {
            echo "## Per (version × leg) results"
            echo ""
            echo "Each cell: scenarios \`ok / total\` (✅ all ok · ⚠️ partial · ❌ missing/empty)"
            echo ""
            echo "$HEADER"
            echo "$SEP"
          } >> "$GITHUB_STEP_SUMMARY"

          # Totals across the matrix
          TOTAL_OK=0
          TOTAL_FAIL=0
          TOTAL_LEGS=0

          for v in $VERS_LIST; do
            ROW="| \`$v\` |"
            while IFS=$'\t' read -r leg _display; do
              SUM="artifacts/playback-${v}-${leg}-${{ github.run_id }}/SUMMARY.txt"
              if [ ! -f "$SUM" ]; then
                ROW="$ROW ❌ — |"
                TOTAL_FAIL=$((TOTAL_FAIL + 1))
                TOTAL_LEGS=$((TOTAL_LEGS + 1))
                continue
              fi
              # Count scenario rows: lines in the table body have "ok" or "timeout"
              # as the 2nd column. Use awk to count by the table-bounded shape
              # (skip header lines / blank lines / final SUMMARY marker).
              OK=$(awk '$2=="ok" {c++} END{print c+0}'      "$SUM" 2>/dev/null || echo 0)
              TO=$(awk '$2=="timeout" {c++} END{print c+0}' "$SUM" 2>/dev/null || echo 0)
              TOT=$((OK + TO))

              if [ "$TOT" -eq 0 ]; then
                CELL="❌ 0/0"
                TOTAL_FAIL=$((TOTAL_FAIL + 1))
              elif [ "$TO" -eq 0 ]; then
                CELL="✅ ${OK}/${TOT}"
                TOTAL_OK=$((TOTAL_OK + 1))
              else
                CELL="⚠️ ${OK}/${TOT}"
                TOTAL_OK=$((TOTAL_OK + 1))
              fi
              ROW="$ROW $CELL |"
              TOTAL_LEGS=$((TOTAL_LEGS + 1))
            done <<< "$LEG_PAIRS"
            echo "$ROW" >> "$GITHUB_STEP_SUMMARY"
          done

          # ---- Aggregate ----
          {
            echo ""
            if [ "$TOTAL_FAIL" -eq 0 ] && [ "$TOTAL_LEGS" -gt 0 ]; then
              echo "## ✅ All ${TOTAL_LEGS} legs produced telemetry"
            elif [ "$TOTAL_LEGS" -eq 0 ]; then
              echo "## ⚠️ No leg artifacts found"
            else
              echo "## ${TOTAL_OK} / ${TOTAL_LEGS} legs produced telemetry · ${TOTAL_FAIL} missing or empty"
            fi
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # ---- Per (version × leg) NRVA viewIds ----
          # Each scenario gets its own NRVA viewId. Click a collapsible to
          # see the per-scenario mapping for that leg. Lets you go from
          # this summary directly to an NR UI event row via WHERE viewId = ...
          {
            echo "## Sessions (NRVA viewIds)"
            echo ""
            echo "Click a leg to expand its scenario → viewId mapping."
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          for v in $VERS_LIST; do
            while IFS=$'\t' read -r leg display; do
              SUM="artifacts/playback-${v}-${leg}-${{ github.run_id }}/SUMMARY.txt"
              [ -f "$SUM" ] || continue

              # SUMMARY.txt body rows look like:
              #   <scenarioId>   ok|timeout   <elapsed>s   <viewId>
              # Pull rows where $2 is ok/timeout AND a viewId-shaped $4 is present.
              ROWS=$(awk '
                $2=="ok" || $2=="timeout" {
                  if (NF >= 4 && $4 != "(not-found)") {
                    printf "| %s | `%s` | %s |\n", $1, $4, $2
                  } else if (NF >= 4) {
                    printf "| %s | _(not captured)_ | %s |\n", $1, $2
                  }
                }
              ' "$SUM")

              [ -z "$ROWS" ] && continue

              {
                echo "<details>"
                echo "<summary><code>v${v}</code> · ${display}</summary>"
                echo ""
                echo "| Scenario | viewId | Result |"
                echo "|---|---|---|"
                echo "$ROWS"
                echo ""
                echo "</details>"
                echo ""
              } >> "$GITHUB_STEP_SUMMARY"
            done <<< "$LEG_PAIRS"
          done

          # ---- NR UI query ----
          {
            echo "### Find this run in New Relic"
            echo "All events from this run carry \`runId = '${{ github.run_id }}'\`."
            echo ""
            echo '```sql'
            echo "SELECT count(*) FROM Mobile_Video WHERE runId = '${{ github.run_id }}'"
            echo "FACET nrvaVersion, legTag, eventName SINCE 1 day ago"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
