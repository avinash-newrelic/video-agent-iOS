name: playback-test

# Reusable child workflow: download a pre-built NRSampleApp.app,
# boot a simulator, run scripted scenarios sequentially, capture per-scenario
# logs + simulator console, upload artifacts.
#
# Called by playback-master.yml — once per (nrva_version, leg).
# Depends on the upstream build artifact `app-<nrva_version>-<platform>`.

on:
  workflow_call:
    inputs:
      nrva_version:
        description: 'NewRelicVideoAgent version under test'
        required: true
        type: string
      leg_tag:
        description: 'Human-readable leg id, e.g. iOS-18-iPhone-16-Pro'
        required: true
        type: string
      device:
        description: 'simctl device name, e.g. "iPhone 16 Pro"'
        required: true
        type: string
      os_version:
        description: 'iOS/tvOS version (empty = use whatever the device has preinstalled)'
        required: false
        type: string
        default: ''
      platform:
        description: 'iOS | tvOS'
        required: true
        type: string
      scenarios:
        description: 'Comma-separated scenario ids to run'
        required: true
        type: string
      run_id:
        description: 'github.run_id of the master run — tagged on every NRVA event'
        required: true
        type: string
      git_sha:
        description: 'commit under test — tagged on every NRVA event'
        required: true
        type: string
      trigger_time:
        description: 'ISO-8601 of master fan-out start — tagged on every NRVA event'
        required: true
        type: string
      nr_overrides:
        description: 'JSON of per-run NRVA overrides (e.g. {"harvest_cycle_secs":5})'
        required: false
        type: string
        default: '{}'
      collector_address:
        description: 'NRVA collector hostname. Empty = default prod collector.'
        required: false
        type: string
        default: ''

    secrets:
      NEW_RELIC_APP_TOKEN:
        required: false   # missing → NRVA disables itself (no telemetry)

env:
  ARTIFACTS_DIR: ${{ github.workspace }}/playback-artifacts

jobs:
  test:
    name: test-${{ inputs.leg_tag }}-${{ inputs.nrva_version }}
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode latest-stable
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Install jq
        run: brew install jq

      - name: Show preinstalled simulator runtimes
        run: xcrun simctl list runtimes

      - name: Download iOS runtime ${{ inputs.os_version }}
        if: inputs.os_version != ''
        run: |
          set -euxo pipefail
          PLATFORM_FLAG="${{ inputs.platform }}"
          sudo xcodebuild -downloadPlatform "$PLATFORM_FLAG" -buildVersion "${{ inputs.os_version }}" \
            || xcodebuild -downloadPlatform "$PLATFORM_FLAG" -buildVersion "${{ inputs.os_version }}"

      - name: Boot simulator
        id: boot
        env:
          DEVICE_NAME: ${{ inputs.device }}
          OS_VERSION: ${{ inputs.os_version }}
          LEG_TAG: ${{ inputs.leg_tag }}
        run: |
          set -euxo pipefail
          if [ -n "$OS_VERSION" ]; then
            RUNTIME_ID="${{ inputs.platform }}-${OS_VERSION//./-}"
            xcrun simctl create "auto-${LEG_TAG}" "$DEVICE_NAME" "$RUNTIME_ID" \
              || echo "(device may already exist — continuing)"
            DEVICE_NAME="auto-${LEG_TAG}"
          fi
          xcrun simctl boot "$DEVICE_NAME" || echo "(already booted)"
          xcrun simctl bootstatus "$DEVICE_NAME" -b
          DEVICE_ID=$(xcrun simctl list devices booted | awk -F '[()]' '/Booted/{print $2; exit}')
          echo "device_id=$DEVICE_ID" >> "$GITHUB_OUTPUT"
          echo "device_name=$DEVICE_NAME" >> "$GITHUB_OUTPUT"
          echo "Booted: $DEVICE_NAME ($DEVICE_ID)"

      - name: Download pre-built app
        uses: actions/download-artifact@v4
        with:
          name: app-${{ inputs.nrva_version }}-${{ inputs.platform }}
          path: app/

      - name: Install app on simulator
        id: install
        env:
          DEVICE_ID: ${{ steps.boot.outputs.device_id }}
        run: |
          set -euxo pipefail
          tar -xf app/NRSampleApp.app.tar -C app/
          APP_DIR=$(find app -maxdepth 2 -name '*.app' -type d | head -1)
          xcrun simctl install "$DEVICE_ID" "$APP_DIR"
          BUNDLE_ID=$(plutil -extract CFBundleIdentifier raw "$APP_DIR/Info.plist")
          echo "bundle_id=$BUNDLE_ID" >> "$GITHUB_OUTPUT"
          echo "Installed: $BUNDLE_ID from $APP_DIR"

      - name: Inject NRVA env into simulator
        env:
          DEVICE_ID: ${{ steps.boot.outputs.device_id }}
          NEW_RELIC_APP_TOKEN: ${{ secrets.NEW_RELIC_APP_TOKEN }}
          NEW_RELIC_COLLECTOR_ADDRESS: ${{ inputs.collector_address }}
          NRVA_VERSION: ${{ inputs.nrva_version }}
          LEG_TAG: ${{ inputs.leg_tag }}
          RUN_ID: ${{ inputs.run_id }}
          GIT_SHA: ${{ inputs.git_sha }}
          TRIGGER_TIME: ${{ inputs.trigger_time }}
          NR_OVERRIDES_JSON: ${{ inputs.nr_overrides }}
        run: |
          set -uo pipefail
          # Sensitive — never echo. State only.
          if [ -n "${NEW_RELIC_APP_TOKEN:-}" ]; then
            xcrun simctl spawn "$DEVICE_ID" launchctl setenv NEW_RELIC_APP_TOKEN "$NEW_RELIC_APP_TOKEN"
            echo "  appToken: (set)"
          else
            echo "  appToken: (not set — NRVA will disable itself)"
          fi
          if [ -n "${NEW_RELIC_COLLECTOR_ADDRESS:-}" ]; then
            xcrun simctl spawn "$DEVICE_ID" launchctl setenv NEW_RELIC_COLLECTOR_ADDRESS "$NEW_RELIC_COLLECTOR_ADDRESS"
            echo "  collector: (custom-set)"
          else
            echo "  collector: (default)"
          fi
          # Attribution — these tag every NRVA event for filtering in NR UI.
          xcrun simctl spawn "$DEVICE_ID" launchctl setenv NRVA_VERSION  "$NRVA_VERSION"
          xcrun simctl spawn "$DEVICE_ID" launchctl setenv LEG_TAG       "$LEG_TAG"
          xcrun simctl spawn "$DEVICE_ID" launchctl setenv RUN_ID        "$RUN_ID"
          xcrun simctl spawn "$DEVICE_ID" launchctl setenv GIT_SHA       "$GIT_SHA"
          xcrun simctl spawn "$DEVICE_ID" launchctl setenv TRIGGER_TIME  "$TRIGGER_TIME"
          # Parse per-run NRVA overrides (JSON object) and setenv each key.
          if [ -n "$NR_OVERRIDES_JSON" ] && [ "$NR_OVERRIDES_JSON" != '{}' ]; then
            echo "  applying nr_overrides:"
            echo "$NR_OVERRIDES_JSON" | jq -r 'to_entries[] | "\(.key)=\(.value)"' | while IFS='=' read -r k v; do
              ENV_KEY="NEW_RELIC_$(echo "$k" | tr '[:lower:]' '[:upper:]')"
              xcrun simctl spawn "$DEVICE_ID" launchctl setenv "$ENV_KEY" "$v"
              echo "    $ENV_KEY=$v"
            done
          fi

      - name: Run scenarios sequentially
        env:
          DEVICE_ID: ${{ steps.boot.outputs.device_id }}
          BUNDLE_ID: ${{ steps.install.outputs.bundle_id }}
          SCENARIOS: ${{ inputs.scenarios }}
          LEG_TAG: ${{ inputs.leg_tag }}
          NRVA_VERSION: ${{ inputs.nrva_version }}
        # No `set -e`/`-u`/`-o pipefail`: this is a long shell pipeline with
        # many commands that legitimately exit non-zero (grep finding nothing,
        # log capture being killed, simctl returning the app's exit code).
        # Each command guarded explicitly with `|| true` / defaults.
        run: |
          set -x
          mkdir -p "$ARTIFACTS_DIR"

          SUMMARY="$ARTIFACTS_DIR/SUMMARY.txt"
          {
            echo "Leg:        $LEG_TAG"
            echo "NRVA:       $NRVA_VERSION"
            echo "Run:        ${{ inputs.run_id }}"
            echo "Trigger:    ${{ inputs.trigger_time }}"
            echo "Scenarios:  $SCENARIOS"
            echo ""
            printf "%-30s %-10s %-10s %-25s\n" "id" "result" "elapsed" "viewId"
            echo "----------------------------------------------------------------------"
          } > "$SUMMARY"

          # Resolve the app's sandbox log dir once — the data container exists
          # because we already installed + (in the env-inject step) booted.
          APP_DATA_DIR=$(xcrun simctl get_app_container "$DEVICE_ID" "$BUNDLE_ID" data 2>/dev/null) || APP_DATA_DIR=""
          if [ -z "$APP_DATA_DIR" ]; then
            echo "::warning::could not resolve app data container — log polling will fall back to wait-only"
          fi
          APP_LOG_DIR="$APP_DATA_DIR/Documents/logs"
          echo "App log dir: $APP_LOG_DIR"

          IFS=',' read -ra SCEN_LIST <<< "$SCENARIOS"
          for sid in "${SCEN_LIST[@]}"; do
            sid=$(echo "$sid" | tr -d ' ')
            [ -z "$sid" ] && continue
            echo "===== scenario: $sid ====="
            SCEN_DIR="$ARTIFACTS_DIR/$sid"
            mkdir -p "$SCEN_DIR"
            LOG_FILE="$SCEN_DIR/auto-play-$sid.log"
            SYSLOG="$SCEN_DIR/syslog.log"
            APP_LOG="$APP_LOG_DIR/auto-play-$sid.log"

            # Clear any stale per-scenario log from a previous iteration so
            # SCENARIO_DONE detection only fires on this run's sentinel.
            rm -f "$APP_LOG" 2>/dev/null || true

            # Tag scenario id into NRVA env so the app sets it as global attr.
            xcrun simctl spawn "$DEVICE_ID" launchctl setenv SCENARIO_ID "$sid" || true

            # Begin unified-log capture (verbose, scoped to app subsystem).
            xcrun simctl spawn "$DEVICE_ID" log stream --level=debug \
              --predicate "subsystem CONTAINS 'NRSampleApp' OR subsystem CONTAINS 'NewRelicVideo'" \
              > "$SYSLOG" 2>&1 &
            LOG_PID=$!

            START=$(date +%s)
            # Plain `simctl launch` returns immediately with the app PID.
            # No --console / --console-pty: those try to attach to a tty and
            # interact badly with `&` backgrounding under GitHub Actions.
            LAUNCH_OUT=$(xcrun simctl launch "$DEVICE_ID" "$BUNDLE_ID" \
              --auto-play "$sid" 2>&1) || true
            echo "  launch out: $LAUNCH_OUT"

            # Poll the app's sandbox log for SCENARIO_DONE sentinel.
            DONE=0
            for i in $(seq 1 60); do
              sleep 1
              if [ -n "$APP_LOG_DIR" ] && [ -f "$APP_LOG" ]; then
                if grep -q "SCENARIO_DONE" "$APP_LOG" 2>/dev/null; then
                  DONE=1
                  break
                fi
              fi
            done
            ELAPSED=$(($(date +%s) - START))
            echo "  done=$DONE  elapsed=${ELAPSED}s"

            # Copy app's in-sandbox log to artifacts BEFORE terminate (in case
            # terminate races with a final flush).
            if [ -n "$APP_LOG_DIR" ] && [ -f "$APP_LOG" ]; then
              cp "$APP_LOG" "$LOG_FILE" 2>/dev/null || true
            fi

            # Stop unified-log capture, terminate app for next scenario.
            kill "$LOG_PID" 2>/dev/null || true
            xcrun simctl terminate "$DEVICE_ID" "$BUNDLE_ID" 2>/dev/null || true

            # Screenshot for forensics.
            xcrun simctl io "$DEVICE_ID" screenshot "$SCEN_DIR/screenshot.png" 2>/dev/null || true

            # Pull viewId — guard the pipeline against grep-no-match exit 1.
            VIEW_ID="(not-found)"
            if [ -f "$LOG_FILE" ]; then
              FOUND=$(grep -oE 'viewId=[A-Za-z0-9-]+' "$LOG_FILE" 2>/dev/null | head -1 || true)
              if [ -n "$FOUND" ]; then
                VIEW_ID="${FOUND#viewId=}"
              fi
            fi

            if [ "$DONE" = "1" ]; then RESULT="ok"; else RESULT="timeout"; fi
            printf "%-30s %-10s %-10s %-25s\n" "$sid" "$RESULT" "${ELAPSED}s" "$VIEW_ID" >> "$SUMMARY"
            echo "  $sid → $RESULT (${ELAPSED}s, viewId=$VIEW_ID)"
          done

          echo "" >> "$SUMMARY"
          echo "===== SUMMARY =====" >> "$SUMMARY"
          cat "$SUMMARY"

          # Generator workflow — always succeed even if a scenario timed out.
          # Telemetry that DID fire still landed in NR UI. SUMMARY.txt records
          # per-scenario verdicts for forensic review.
          exit 0

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playback-${{ inputs.nrva_version }}-${{ inputs.leg_tag }}-${{ inputs.run_id }}
          path: ${{ env.ARTIFACTS_DIR }}/
          retention-days: 14
