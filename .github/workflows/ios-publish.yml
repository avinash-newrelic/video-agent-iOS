name: Publish to CocoaPods

on:
  pull_request:
    types:
      - closed
    branches:
      - master

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Test run without publishing, tagging, or creating a release'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: macos-latest
    # Only run if PR was merged and has release label
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release'))

    env:
      DRY_RUN: ${{ inputs.dry_run || 'false' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Install CocoaPods
        run: |
          gem install cocoapods
          pod --version

      - name: Extract version from podspec
        id: get_version
        run: |
          VERSION=$(grep "s.version" NewRelicVideoAgent.podspec | sed -E "s/.*s\.version[[:space:]]*=[[:space:]]*'([0-9]+\.[0-9]+\.[0-9]+)'.*/\1/")
          echo "Extracted version from podspec: $VERSION"
      
          if [ -z "$VERSION" ]; then
            echo "Failed to extract version"
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Cleanup existing tag if present
        if: env.DRY_RUN != 'true'
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"

          # Check if tag exists locally
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION exists locally, deleting..."
            git tag -d "v$VERSION"
          fi

          # Check if tag exists on remote
          if git ls-remote --tags origin | grep -q "refs/tags/v$VERSION"; then
            echo "Tag v$VERSION exists on remote, deleting..."
            git push --delete origin "v$VERSION" || echo "Failed to delete remote tag (may not have permission)"
          else
            echo "Tag v$VERSION does not exist on remote"
          fi

      - name: Validate podspecs
        run: |
          echo "Validating podspecs..."

          validate_with_retry() {
            local podspec=$1
            local max_attempts=3
            local attempt=1

            while [ $attempt -le $max_attempts ]; do
              echo "Validating $podspec (attempt $attempt/$max_attempts)..."

              set +e
              pod lib lint $podspec --allow-warnings 2>&1 | tee validation_output.log
              EXIT_CODE=$?
              set -e

              if [ $EXIT_CODE -eq 0 ]; then
                echo "$podspec validated successfully"
                rm -f validation_output.log
                return 0
              else
                if grep -qiE "(internal server error|connection.*(timed out|refused|reset)|CDN:.*(trunk|URL)|SSL|502 Bad Gateway|503 Service|504 Gateway|ECONNRESET|ECONNREFUSED|network is unreachable|temporarily unavailable|rate limit|429 Too Many|couldn.t connect|socket hang up)" validation_output.log; then
                  echo "Transient error detected for $podspec"
                  if [ $attempt -lt $max_attempts ]; then
                    echo "Retrying in 10 seconds..."
                    sleep 10
                    attempt=$((attempt + 1))
                  else
                    echo "Failed after $max_attempts attempts"
                    cat validation_output.log
                    rm -f validation_output.log
                    return 1
                  fi
                else
                  echo "Validation failed with non-retryable error"
                  cat validation_output.log
                  rm -f validation_output.log
                  return 1
                fi
              fi
            done
          }

          # Validate each podspec with retry logic
          validate_with_retry "NewRelicVideoAgent.podspec"
          validate_with_retry "NRAVPlayerTracker.podspec"
          validate_with_retry "NRIMATracker.podspec"

          echo ""
          echo "All podspecs validated successfully!"



      - name: Setup CocoaPods trunk authentication
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        run: |
          if [ -z "$COCOAPODS_TRUNK_TOKEN" ]; then
            echo "Error: COCOAPODS_TRUNK_TOKEN secret is not set"
            echo "Please add your CocoaPods trunk token to GitHub repository secrets"
            exit 1
          fi

          cat > ~/.netrc <<EOF
          machine trunk.cocoapods.org
          login token
          password ${COCOAPODS_TRUNK_TOKEN}
          EOF
          chmod 600 ~/.netrc

          # Verify the token actually works
          echo "Verifying trunk authentication..."
          if ! pod trunk me 2>&1; then
            echo "Error: CocoaPods trunk token is invalid or expired"
            echo "Please update COCOAPODS_TRUNK_TOKEN in GitHub repository secrets"
            exit 1
          fi
          echo "CocoaPods trunk authentication verified"

      - name: Create and push git tag
        if: env.DRY_RUN != 'true'
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "Creating tag v$VERSION..."
          git tag "v$VERSION"
          git push origin "v$VERSION"
          echo "Tag v$VERSION created and pushed successfully!"

      - name: Publish pods to CocoaPods
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"

          # Check if a pod version is published (CLI + API fallback)
          check_published() {
            local pod=$1
            pod trunk info "$pod" 2>/dev/null | grep -q "- $VERSION" ||
              curl -sf "https://trunk.cocoapods.org/api/v1/pods/$pod" 2>/dev/null | grep -q "\"$VERSION\""
          }

          # Publish a single pod with retry logic
          publish_pod() {
            local pod=$1
            local podspec=$2
            local max_attempts=3
            local attempt=1

            echo ""
            echo "========== $pod =========="

            if check_published "$pod"; then
              echo "$pod $VERSION is already published, skipping..."
              return 0
            fi

            while [ $attempt -le $max_attempts ]; do
              echo "Publishing $pod $VERSION (attempt $attempt/$max_attempts)..."

              if [ "$DRY_RUN" = "true" ]; then
                echo "[DRY RUN] Would run: pod trunk push $podspec --allow-warnings"
                echo "$pod dry-run publish complete!"
                rm -f publish_output.log
                return 0
              fi

              set +e
              pod trunk push "$podspec" --allow-warnings 2>&1 | tee publish_output.log
              local exit_code=$?
              set -e

              if [ $exit_code -eq 0 ]; then
                echo "$pod published successfully!"
                rm -f publish_output.log
                return 0
              fi

              if grep -q "Unable to accept duplicate entry" publish_output.log; then
                echo "$pod was already published (duplicate entry)"
                rm -f publish_output.log
                return 0
              fi

              if grep -qiE "(internal server error|connection.*(timed out|refused|reset)|CDN:.*(trunk|URL)|SSL|502 Bad Gateway|503 Service|504 Gateway|ECONNRESET|ECONNREFUSED|network is unreachable|temporarily unavailable|rate limit|429 Too Many|couldn.t connect|socket hang up|Unable to find a specification|not found in trunk|dependency.*not found)" publish_output.log; then
                echo "Transient error detected."
                sleep 10
                if check_published "$pod"; then
                  echo "$pod published successfully despite the error!"
                  rm -f publish_output.log
                  return 0
                fi
                if [ $attempt -lt $max_attempts ]; then
                  echo "Retrying in 30 seconds..."
                  sleep 30
                  attempt=$((attempt + 1))
                else
                  echo "Failed after $max_attempts attempts:"
                  cat publish_output.log
                  rm -f publish_output.log
                  return 1
                fi
              else
                echo "Non-retryable error:"
                cat publish_output.log
                rm -f publish_output.log
                return 1
              fi
            done
          }

          # Wait for a pod to be indexed
          wait_for_indexing() {
            local pod=$1
            local max_wait=10
            local wait_time=30
            local i=0

            echo ""
            echo "Waiting for $pod to be indexed..."
            while [ $i -lt $max_wait ]; do
              i=$((i + 1))
              if pod search "$pod" 2>/dev/null | grep -q "$VERSION"; then
                echo "$pod $VERSION is now indexed!"
                return 0
              fi
              if [ $i -lt $max_wait ]; then
                echo "  Attempt $i/$max_wait - not indexed yet, waiting ${wait_time}s..."
                sleep $wait_time
              fi
            done
            echo "Timeout waiting for indexing, proceeding with publish (retry will handle it)..."
          }

          # Publish NewRelicVideoAgent first (other pods depend on it)
          publish_pod "NewRelicVideoAgent" "NewRelicVideoAgent.podspec"
          if [ "$DRY_RUN" != "true" ]; then
            wait_for_indexing "NewRelicVideoAgent"
          fi

          # Publish dependent pods — if the first succeeds, indexing is confirmed
          # so the second doesn't need any additional wait
          publish_pod "NRAVPlayerTracker" "NRAVPlayerTracker.podspec"
          publish_pod "NRIMATracker" "NRIMATracker.podspec"

          echo ""
          echo "All pods published!"

      - name: Extract changelog excerpt
        id: changelog
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          VERSION_REGEX=$(echo "$VERSION" | sed 's/\./\\./g')
          start=$(grep -n "^## \[$VERSION_REGEX\]" CHANGELOG.md | cut -d: -f1)

          if [ -z "$start" ]; then
            CHANGELOG="See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/master/CHANGELOG.md) for details."
          else
            end=$(awk -v start="$start" 'NR > start && /^## \[/ {print NR; exit}' CHANGELOG.md)
            if [ -z "$end" ]; then
              tail -n +"$((start+1))" CHANGELOG.md > excerpt.txt
            else
              sed -n "$((start+1)),$((end-1))p" CHANGELOG.md > excerpt.txt
            fi
            CHANGELOG=$(cat excerpt.txt)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build XCFrameworks
        if: env.DRY_RUN != 'true'
        run: |
          chmod +x ./build-xcframeworks.sh
          ./build-xcframeworks.sh

      - name: Create GitHub Release
        if: env.DRY_RUN != 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: v${{ steps.get_version.outputs.version }}
          body: |
            ## Release v${{ steps.get_version.outputs.version }}

            Published to CocoaPods:
            - NewRelicVideoAgent `${{ steps.get_version.outputs.version }}`
            - NRAVPlayerTracker `${{ steps.get_version.outputs.version }}`
            - NRIMATracker `${{ steps.get_version.outputs.version }}`

            ### What's Changed

            ${{ steps.changelog.outputs.changelog }}
          files: xcframeworks.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify publication
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"

          if [ "$DRY_RUN" = "true" ]; then
            echo ""
            echo "=================================="
            echo "DRY RUN v$VERSION Complete!"
            echo "=================================="
            echo ""
            echo "Steps validated:"
            echo "  - Version extraction: $VERSION"
            echo "  - Podspec validation: passed"
            echo "  - Trunk authentication: verified"
            echo ""
            echo "Steps skipped (dry run):"
            echo "  - Tag creation: v$VERSION"
            echo "  - Pod publishing: NewRelicVideoAgent, NRAVPlayerTracker, NRIMATracker"
            echo "  - XCFramework build"
            echo "  - GitHub release creation"
            exit 0
          fi

          # Check published via CLI or API fallback, with retry
          verify_pod() {
            local pod=$1
            local attempt=1
            echo "=== $pod ==="
            while [ $attempt -le 3 ]; do
              if pod trunk info "$pod" 2>/dev/null | grep -q "- $VERSION" ||
                 curl -sf "https://trunk.cocoapods.org/api/v1/pods/$pod" 2>/dev/null | grep -q "\"$VERSION\""; then
                echo "$pod $VERSION - verified"
                return 0
              fi
              echo "  Attempt $attempt/3 - not found, retrying in 15s..."
              sleep 15
              attempt=$((attempt + 1))
            done
            echo "WARNING: Could not verify $pod (publish step succeeded, likely published)"
            return 0
          }

          verify_pod "NewRelicVideoAgent"
          verify_pod "NRAVPlayerTracker"
          verify_pod "NRIMATracker"

          echo ""
          echo "=================================="
          echo "Release v$VERSION Complete!"
          echo "=================================="
          echo ""
          echo "Users can now install with:"
          echo "  pod 'NewRelicVideoAgent', '~> $VERSION'"
          echo "  pod 'NRAVPlayerTracker', '~> $VERSION'"
          echo "  pod 'NRIMATracker', '~> $VERSION'"